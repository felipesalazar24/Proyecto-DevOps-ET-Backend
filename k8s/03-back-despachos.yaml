apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-despachos
  namespace: tienda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: back-despachos
  template:
    metadata:
      labels:
        app: back-despachos
    spec:
      containers:
        
name: back-despachos# REEMPLAZA "TU_USUARIO_DOCKER" POR TU USUARIO REAL
        image: TU_USUARIO_DOCKER/back-despachos:latest
        env:
name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/tienda_db"
name: SPRING_DATASOURCE_USERNAME
        value: "root"
name: SPRING_DATASOURCE_PASSWORD
      value: "root123"
  ports:
containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: back-despachos-service
  namespace: tienda
spec:
  selector:
    app: back-despachos
  ports:
    
protocol: TCP
    port: 8081
    targetPort: 8081