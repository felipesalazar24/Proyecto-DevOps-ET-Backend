name: CI/CD Pipeline - DevOps Project

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  # Variables de entorno generales
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
  AWS_REGION: us-east-1

jobs:
  build-and-test:
    name: Build & Test Applications
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Java 17 (Para Spring Boot)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build y Test back-Despachos
        working-directory: ./backend/back-Despachos_SpringBoot/SpringBoot-API-REST-DESPACHO
        run: mvn clean package -B -DskipTests # Quita -DskipTests si tienes pruebas configuradas

      - name: Build y Test back-Ventas
        working-directory: ./backend/back-Ventas_SpringBoot/SpringBoot-API-REST-VENTAS
        run: mvn clean package -B -DskipTests

      # Si el front usa Node.js, aquí iría la configuración de npm
      # - name: Configurar Node.js (Para el Front)
      #   uses: actions/setup-node@v3
      #   with:
      #     node-version: '18'
      # - name: Build front_despacho
      #   working-directory: ./front_despacho
      #   run: npm install && npm run build

  build-and-push-docker:
    name: Build & Push Docker Images
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y Subir imagen Front-End
        working-directory: ./front_despacho
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest

      - name: Construir y Subir imagen Back-Despachos
        working-directory: ./backend/back-Despachos_SpringBoot/SpringBoot-API-REST-DESPACHO
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest

      - name: Construir y Subir imagen Back-Ventas
        working-directory: ./back-Ventas_SpringBoot
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest

  deploy-to-aws:
    name: Deploy to AWS (ECS/EKS)
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Desplegar en AWS
        run: |
          echo "Ejecutando despliegue automatizado..."
          # AQUÍ DEBES COLOCAR EL COMANDO EXACTO SEGÚN TU ORQUESTADOR
          
          # Ejemplo si usas Amazon ECS:
          # aws ecs update-service --cluster MiCluster --service front-service --force-new-deployment
          # aws ecs update-service --cluster MiCluster --service back-ventas-service --force-new-deployment
          # aws ecs update-service --cluster MiCluster --service back-despachos-service --force-new-deployment
          
          # Ejemplo si usas Amazon EKS (Kubernetes):
          # kubectl apply -f k8s/
          # kubectl rollout restart deployment/front-deployment